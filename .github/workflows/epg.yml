name: Update Alpha EPG

on:
  schedule:
    # Τρέχει κάθε μέρα στις 18:00 ώρα server (UTC+3)
    - cron: '0 15 * * *' # 18:00 Κύπρου = 15:00 UTC
  workflow_dispatch: # για χειροκίνητη εκτέλεση

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run epg.py
        run: |
          python epg.py

      - name: Commit epg.xml if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add epg.xml
          git diff-index --quiet HEAD || git commit -m "Update EPG for next day"
          git push

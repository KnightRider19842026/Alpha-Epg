name: Alpha Cyprus 3-Day EPG

on:
  schedule:
    - cron: "0 2 * * *"   # κάθε μέρα 02:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install libs
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python epg.py

      - name: Push XML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add epg.xml
          git commit -m "Auto EPG update" || echo "No changes"
          git push

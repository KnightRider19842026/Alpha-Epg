version: "3.9"

services:
  epg-updater:
    image: alpine:3.20
    container_name: epg-updater
    restart: unless-stopped
    
    volumes:
      - ./run_epg.sh:/run_epg.sh:ro          # Το script που τρέχει το alpha
      - ./logs:/logs                         # Φάκελος για logs
    
    command: >
      sh -c "
        apk add --no-cache bash dcron tzdata && 
        chmod +x /run_epg.sh && 
        echo '0 3 */2 * * /run_epg.sh >> /logs/epg.log 2>&1' > /etc/crontabs/root && 
        crond -f -L /dev/stdout
      "

    environment:
      - TZ=Europe/Athens                    # Αλλάξε αν θες άλλη ζώνη ώρας
